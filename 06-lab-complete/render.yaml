services:
  - type: web
    name: techshop-sales-advisor
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: TechShop Sales Advisor
      - key: APP_VERSION
        value: "1.0.0"
      - key: AGENT_API_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: DAILY_BUDGET_USD
        value: "1.0"
      - key: GLOBAL_DAILY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
